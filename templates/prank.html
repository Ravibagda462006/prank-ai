<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOTCHA 😂 | Crush Detector AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😂</text></svg>" />
</head>
<body>

  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <div class="scanlines"></div>
  <canvas id="particle-canvas"></canvas>
  <div class="floating-hearts"></div>
  <button id="sound-toggle">🔊 SOUND ON</button>

  <main class="page page-fade">
    <div class="glass-card prank-wrap">

      <!-- Big Reveal -->
      <div class="gotcha-text" id="gotcha-text">GOTCHA 😂</div>

      <p class="prank-msg" id="prank-msg">Loading prank message...</p>

      <hr class="neon-divider" />

      <!-- Info box: shows what was entered -->
      <div class="info-box">
        <div class="info-row" style="margin-bottom:0.4rem;">
          <span class="info-key">👤 Your Name:</span>
          <span class="info-value">{{ user_name }}</span>
        </div>
        <div class="info-row" style="margin-bottom:0.4rem;">
          <span class="info-key">💖 Crush Name:</span>
          <span class="info-value">{{ crush_name }}</span>
        </div>
        <div class="info-row">
          <span class="info-key">🕐 Timestamp:</span>
          <span class="info-value" style="color:var(--cyan);">{{ timestamp }}</span>
        </div>
      </div>

      <!-- CSV saved badge -->
      <div style="text-align:center; margin-bottom:1.4rem;">
        <span class="csv-badge">💾 SECRET ENTRY LOGGED TO crush_log.csv 😈</span>
      </div>

      <!-- Action Buttons -->
      <div class="btn-row">
        <a href="/" class="btn-secondary btn-outline-pink">
          🔄 Prank Again
        </a>
        <a href="/logs" class="btn-secondary btn-outline-cyan">
          📋 View Logs
        </a>
        <a href="/reset" class="btn-secondary btn-outline-purple">
          🏠 Home
        </a>
      </div>

      <hr class="neon-divider" />
      <p style="text-align:center; font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--text-dim); letter-spacing:0.08em;">
        NO REAL AI WAS USED · JUST FRIENDSHIP & RANDOM NUMBERS
      </p>

    </div>
  </main>

  <script src="{{ url_for('static', filename='particles.js') }}"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    const PRANK_MESSAGES = [
      "YOU JUST GOT ABSOLUTELY PLAYED! 💀",
      "Bro really typed their crush's name… 😭",
      "The Quantum AI has stolen your secrets 😈",
      "THERE IS NO AI. It was random numbers all along 💀",
      "Your bestie is going to love this screenshot 😂",
      "Science has confirmed: you got pranked 🔬",
      "Neural pathways scanned… embarrassment level: MAX 📈",
      "404: Dignity not found 🤣",
      "The romance satellites have receipts now 👀",
    ];

    /* Pick random message */
    document.getElementById("prank-msg").textContent =
      PRANK_MESSAGES[Math.floor(Math.random() * PRANK_MESSAGES.length)];

    /* Dramatic entrance: flash GOTCHA text */
    const gtEl = document.getElementById("gotcha-text");
    let flashes = 0;
    const flashId = setInterval(() => {
      gtEl.style.opacity = gtEl.style.opacity === "0" ? "1" : "0";
      if (++flashes >= 6) { clearInterval(flashId); gtEl.style.opacity = "1"; }
    }, 200);
  </script>

</body>
</html>
